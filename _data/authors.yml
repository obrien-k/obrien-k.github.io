# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name:              Kyle OBrien (Kai)
  email:             0kyleobrien@gmail.com

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:
    Software engineer, writer, and community builder. I've been tinkering with
    JavaScript since before it was cool, shipped products at BigCommerce, and
    championed GraphQL at Apollo.|Currently writing about systems, career growth, and the alchemical side of code.

  # This photo will be used in the about section
  picture:
    path:            /assets/img/profile.jpg
    # srcset is optional, but can be used to provide higher res versions for retina displays
    srcset:
      1x:            /assets/img/profile.jpg
      #2x:            /assets/img/profile@2x.jpg

